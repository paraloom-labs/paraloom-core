name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# `mold` is significantly faster than the default `ld` for linking
# Rust binaries on Linux. Install via apt in each job that links
# (build, test*, coverage) and route the toolchain through it.
env:
  RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

jobs:
  format-and-lint:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # mold is required because the workflow-level RUSTFLAGS routes
      # all linking through it, including clippy's build-script links.
      - name: Install mold
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "paraloom-ci"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy warnings
        run: cargo clippy -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af
          sudo apt-get clean
          df -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            mold \
            protobuf-compiler \
            clang \
            libclang-dev \
            cmake \
            libsnappy-dev \
            liblz4-dev \
            libzstd-dev \
            zlib1g-dev \
            libbz2-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "paraloom-ci"

      # `--all-targets` compiles integration tests under `tests/` and
      # any examples in addition to the lib and bins. Catches dead
      # imports in test files that would otherwise drift silently
      # because `cargo test --lib` does not touch them. See #89.
      - name: Build all features (lib, bins, tests, examples)
        run: cargo build --all-features --all-targets

  test-quick:
    name: Quick Test (All Modules)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af
          sudo apt-get clean
          df -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            mold \
            protobuf-compiler \
            clang \
            libclang-dev \
            cmake \
            libsnappy-dev \
            liblz4-dev \
            libzstd-dev \
            zlib1g-dev \
            libbz2-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "paraloom-ci"

      - name: Run all tests (quick check)
        run: cargo test --lib --all-features

  test:
    name: Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        module:
          - privacy
          - compute
          - storage
          - network
          - consensus
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af
          sudo apt-get clean
          df -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            mold \
            protobuf-compiler \
            clang \
            libclang-dev \
            cmake \
            libsnappy-dev \
            liblz4-dev \
            libzstd-dev \
            zlib1g-dev \
            libbz2-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "paraloom-ci"

      - name: Run module tests (thread-safe)
        run: cargo test --lib ${{ matrix.module }} --all-features -- --test-threads=1

  test-binaries:
    name: Test Binaries
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af
          sudo apt-get clean
          df -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            mold \
            protobuf-compiler \
            clang \
            libclang-dev \
            cmake \
            libsnappy-dev \
            liblz4-dev \
            libzstd-dev \
            zlib1g-dev \
            libbz2-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "paraloom-ci"

      - name: Build setup ceremony binary
        run: cargo build --bin setup_compute_ceremony

      - name: Build all binaries
        run: cargo build --bins

  consensus-network-e2e:
    name: Consensus Network E2E (libp2p)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af
          sudo apt-get clean
          df -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            mold \
            protobuf-compiler \
            clang \
            libclang-dev \
            cmake \
            libsnappy-dev \
            liblz4-dev \
            libzstd-dev \
            zlib1g-dev \
            libbz2-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "paraloom-ci"

      # The #181 Layer 2 test is `#[ignore]`'d — it binds loopback TCP and
      # depends on gossip-mesh timing — and needs no Solana validator, so it
      # runs here on a plain runner rather than in the bridge-e2e workflow
      # (which is path-filtered to the bridge sources). `--test-threads=1`
      # keeps the two nodes' fixed-lifetime ports and tasks from overlapping
      # with any future test in the same binary.
      - name: Run consensus network E2E (ignored)
        run: cargo test --test consensus_network_e2e --all-features -- --ignored --test-threads=1 --nocapture

      # Transfer twin of the above (#194). Same override-seam approach — no
      # real proof or transfer key needed, so it runs on a plain runner.
      - name: Run transfer consensus network E2E (ignored)
        run: cargo test --test transfer_consensus_network_e2e --all-features -- --ignored --test-threads=1 --nocapture

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [test, test-binaries]
    if: false # Disabled due to RAM limitations on free runners
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af
          sudo apt-get clean
          df -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            mold \
            protobuf-compiler \
            clang \
            libclang-dev \
            cmake \
            libsnappy-dev \
            liblz4-dev \
            libzstd-dev \
            zlib1g-dev \
            libbz2-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage report
        run: cargo tarpaulin --out Xml --lib --tests --timeout 300

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false
