name: CI

on:
  push:
    branches: [ main, feature/privacy-layer, feature/solana-bridge, 'feature/zksnark-verification', 'feature/compute-layer', 'feature/compute-privacy-integration' ]
  pull_request:
    branches: [ main ]

jobs:
  format-and-lint:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: rustfmt, clippy

      - name: Check formatting
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all -- --check

      - name: Clippy warnings
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af
          sudo apt-get clean
          df -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            protobuf-compiler \
            clang \
            libclang-dev \
            cmake \
            libsnappy-dev \
            liblz4-dev \
            libzstd-dev \
            zlib1g-dev \
            libbz2-dev

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "paraloom-ci"

      - name: Build all features
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --all-features

  test-core:
    name: Core Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af
          sudo apt-get clean
          df -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            protobuf-compiler \
            clang \
            libclang-dev \
            cmake \
            libsnappy-dev \
            liblz4-dev \
            libzstd-dev \
            zlib1g-dev \
            libbz2-dev

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "paraloom-ci"

      - name: Run core tests
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --lib --all-features
        env:
          CARGO_INCREMENTAL: 0

  test-privacy:
    name: Privacy Layer Tests (103 tests)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af
          sudo apt-get clean
          df -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            protobuf-compiler \
            clang \
            libclang-dev \
            cmake \
            libsnappy-dev \
            liblz4-dev \
            libzstd-dev \
            zlib1g-dev \
            libbz2-dev

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "paraloom-ci"

      - name: Run privacy layer tests
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --lib privacy -- --test-threads=1

      - name: Run privacy integration tests
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --lib privacy::integration_tests -- --nocapture

  test-compute:
    name: Compute Layer Tests (31 tests)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af
          sudo apt-get clean
          df -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            protobuf-compiler \
            clang \
            libclang-dev \
            cmake \
            libsnappy-dev \
            liblz4-dev \
            libzstd-dev \
            zlib1g-dev \
            libbz2-dev

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "paraloom-ci"

      - name: Run compute layer tests
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --lib compute --all-features -- --test-threads=1

      - name: Build setup ceremony binary
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --bin setup_compute_ceremony

  test-private-compute:
    name: Private Compute Tests (11 tests)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af
          sudo apt-get clean
          df -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            protobuf-compiler \
            clang \
            libclang-dev \
            cmake \
            libsnappy-dev \
            liblz4-dev \
            libzstd-dev \
            zlib1g-dev \
            libbz2-dev

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "paraloom-ci"

      - name: Run private compute tests
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --lib compute::private_job --all-features

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [test-core, test-privacy, test-compute, test-private-compute]
    if: false # Disabled due to RAM limitations on free runners
    steps:
      - uses: actions/checkout@v3

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af
          sudo apt-get clean
          df -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            protobuf-compiler \
            clang \
            libclang-dev \
            cmake \
            libsnappy-dev \
            liblz4-dev \
            libzstd-dev \
            zlib1g-dev \
            libbz2-dev

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage report
        run: cargo tarpaulin --out Xml --lib --tests --timeout 300

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false
