name: Build Release Binaries

on:
  workflow_dispatch:  # Manual trigger only
  push:
    tags:
      - 'v*'  # Auto-run on version tags

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — primary validator deployment target.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: paraloom-node
            asset_name: paraloom-node-linux-amd64

          # macOS x86_64 — older Intel Macs, dev workstations.
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: paraloom-node
            asset_name: paraloom-node-macos-amd64

          # macOS aarch64 — Apple Silicon (M1/M2/M3) developer
          # workstations, where most contributor builds happen.
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: paraloom-node
            asset_name: paraloom-node-macos-arm64

          # Windows and Linux aarch64 are intentionally out of scope
          # for this slice — Solana SDK on Windows MSVC needs more
          # toolchain plumbing than fits this PR, and aarch64 Linux
          # cross-compilation hits RocksDB's bindgen tooling. Both
          # are tracked under #70 follow-ups.

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            protobuf-compiler \
            clang \
            libclang-dev \
            cmake \
            libc++-dev \
            libc++abi-dev \
            libstdc++-12-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install protobuf cmake

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin paraloom-node

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} artifacts/${{ matrix.asset_name }}

      - name: Compute SHA-256 checksum
        shell: bash
        run: |
          # Per-platform checksum file. The package job aggregates
          # these into a single SHA256SUMS that operators verify.
          cd artifacts
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"
          fi
          cat "${{ matrix.asset_name }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            artifacts/${{ matrix.asset_name }}
            artifacts/${{ matrix.asset_name }}.sha256
          retention-days: 7

  package:
    name: Aggregate Checksums and Publish Release
    needs: build
    runs-on: ubuntu-latest
    # Only publish a GitHub Release on actual version tags. Manual
    # workflow_dispatch runs still produce per-platform artifacts via
    # the build job above; they just don't update the Releases page.
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      # `contents: write` lets `softprops/action-gh-release` attach
      # files to the GitHub Release for this tag.
      contents: write
      # `id-token: write` lets cosign request a short-lived OIDC
      # token from GitHub Actions and use it as the trust anchor
      # for keyless signing — no long-lived signing key to manage,
      # no key rotation, the GitHub Actions identity is the
      # provenance. Without this permission, cosign keyless fails.
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Aggregate checksums
        shell: bash
        run: |
          # Each per-platform `*.sha256` file already contains a
          # `<hash>  <filename>` line; concatenating them produces a
          # canonical SHA256SUMS that an operator can verify with
          # `sha256sum -c SHA256SUMS` after downloading the whole
          # release.
          mkdir -p release
          for d in artifacts/*/; do
            name="${d#artifacts/}"
            name="${name%/}"
            cp "$d/$name" "release/$name"
            cat "$d/$name.sha256" >> release/SHA256SUMS
          done
          echo "----- SHA256SUMS -----"
          cat release/SHA256SUMS

      # Generate a CycloneDX SBOM by scanning the repository at the
      # tagged commit. anchore/sbom-action runs Syft underneath; for
      # a Cargo-based project that means it walks `Cargo.lock` and
      # produces a JSON-formatted SBOM listing every transitive
      # dependency, version, and license. Operators can ingest this
      # into their vulnerability-management tooling, and a downstream
      # auditor can quickly answer "is this binary affected by
      # CVE-X" by grepping the SBOM rather than rebuilding from
      # source. Tracked under #70.
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: paraloom-core-sbom.cdx.json
          output-file: release/paraloom-core-sbom.cdx.json
          # The action also uploads the SBOM directly to the release
          # via the `Upload SBOM as Release Asset` step it injects;
          # we duplicate it as a workflow artifact to make
          # post-mortem inspection easier.
          upload-release-assets: false
          upload-artifact: true

      # Sigstore keyless signing of the integrity-anchoring files.
      # SHA256SUMS pins the binaries' content; signing it pins
      # *who produced* it. Operators can then verify both:
      #
      #   cosign verify-blob \
      #     --certificate SHA256SUMS.pem \
      #     --signature SHA256SUMS.sig \
      #     --certificate-identity-regexp \
      #         "https://github.com/paraloom-labs/paraloom-core/.*" \
      #     --certificate-oidc-issuer \
      #         "https://token.actions.githubusercontent.com" \
      #     SHA256SUMS
      #
      # No long-lived key to leak: cosign requests a short-lived
      # OIDC token from GitHub Actions (granted by the
      # `id-token: write` permission above), Fulcio mints a
      # one-shot certificate bound to the workflow identity, and
      # the signature lands in Rekor's transparency log. Tracked
      # under #70.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          # Pin the version so a cosign upgrade does not silently
          # change the signing-output shape between releases.
          cosign-release: 'v2.4.1'

      - name: Sign SHA256SUMS and SBOM
        shell: bash
        run: |
          cd release
          for blob in SHA256SUMS paraloom-core-sbom.cdx.json; do
            echo "Signing ${blob} with cosign keyless..."
            cosign sign-blob \
              --yes \
              --output-signature "${blob}.sig" \
              --output-certificate "${blob}.pem" \
              "${blob}"
          done
          ls -lh *.sig *.pem

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          # Append binaries, the aggregate checksum file, the SBOM,
          # and the cosign signatures + certificates to the release
          # that was drafted by `release-drafter` on the tagged
          # merge. An operator can verify the chain end-to-end
          # offline once they have the binaries + SHA256SUMS +
          # SHA256SUMS.sig + SHA256SUMS.pem.
          files: |
            release/paraloom-node-*
            release/SHA256SUMS
            release/SHA256SUMS.sig
            release/SHA256SUMS.pem
            release/paraloom-core-sbom.cdx.json
            release/paraloom-core-sbom.cdx.json.sig
            release/paraloom-core-sbom.cdx.json.pem
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container:
    name: Build and Sign Container Image
    needs: build
    runs-on: ubuntu-latest
    # Same gating as the package job: only run on actual tag
    # pushes. Manual workflow_dispatch runs still produce
    # per-platform artifacts but do not push images to GHCR.
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      # Push image layers to GHCR.
      packages: write
      # OIDC token for cosign keyless signing of the pushed image.
      id-token: write
      # Read-only on contents (we already have the prebuilt binary
      # via the artifact download).
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Pull the binary the build job already produced — same bytes
      # as the release artifact, so the image is provably consistent
      # with the tarball an operator verified via SHA256SUMS.
      - name: Download Linux amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: paraloom-node-linux-amd64
          path: paraloom-node-linux-amd64

      # Derive the registry tag from the git ref. \`refs/tags/v0.5.0\`
      # → \`v0.5.0\`. Each release pushes both the version-pinned tag
      # and \`latest\`; operators can pin to a version while CI/dev
      # consumers can track the latest known-good build.
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build with the prebuilt binary embedded. The Dockerfile at
      # the repo root expects \`paraloom-node-linux-amd64/paraloom-node-linux-amd64\`
      # to exist in the build context, which the artifact download
      # above sets up exactly. Layer cache keyed off GHCR so
      # consecutive releases reuse the runtime base layer.
      - name: Build and push image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Include the digest in the action output so cosign can
          # sign by digest — signing by tag is racy if a follow-up
          # build re-tags the same name to different content.
          provenance: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      # Sign the image by digest, not by tag. The tag could be
      # repointed (e.g. \`latest\`); the digest is content-addressed
      # and immutable. Operators verify with:
      #
      #   cosign verify ghcr.io/paraloom-labs/paraloom-core@<digest> \\
      #     --certificate-identity-regexp \\
      #         "https://github.com/paraloom-labs/paraloom-core/.*" \\
      #     --certificate-oidc-issuer \\
      #         "https://token.actions.githubusercontent.com"
      - name: Sign the published image
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        shell: bash
        run: |
          for tag in $TAGS; do
            # Strip the tag, keep the registry+name; cosign sees
            # \`registry/name@digest\`.
            name="${tag%:*}"
            echo "Signing ${name}@${DIGEST}..."
            cosign sign --yes "${name}@${DIGEST}"
          done
