<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paraloom Task Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0e27;
            color: #00ff88;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }

        .section {
            background: #1a1f3a;
            border: 2px solid #00ff88;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section h2 {
            color: #00ddff;
            margin-bottom: 15px;
            border-bottom: 1px solid #00ff88;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #00ddff;
        }

        input, select {
            width: 100%;
            padding: 10px;
            background: #0a0e27;
            border: 1px solid #00ff88;
            color: #00ff88;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        button {
            background: #00ff88;
            color: #0a0e27;
            border: none;
            padding: 12px 30px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s;
        }

        button:hover {
            background: #00ddff;
            box-shadow: 0 0 20px #00ddff;
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #0a0e27;
            border: 1px solid #00ff88;
            padding: 15px;
            border-radius: 4px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            color: #00ff88;
            font-weight: bold;
        }

        .stat-label {
            color: #00ddff;
            font-size: 14px;
            margin-top: 5px;
        }

        .log-container {
            background: #0a0e27;
            border: 1px solid #00ff88;
            border-radius: 4px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            font-size: 12px;
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 5px;
            border-left: 3px solid #00ff88;
            padding-left: 10px;
        }

        .log-entry.success {
            border-left-color: #00ff88;
        }

        .log-entry.error {
            border-left-color: #ff0066;
            color: #ff0066;
        }

        .log-entry.info {
            border-left-color: #00ddff;
            color: #00ddff;
        }

        .timestamp {
            color: #666;
            font-size: 10px;
        }

        #taskStatus {
            margin-top: 15px;
            padding: 15px;
            background: #0a0e27;
            border: 1px solid #00ff88;
            border-radius: 4px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #0a0e27;
            border: 1px solid #00ff88;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00ddff);
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a0e27;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Paraloom Distributed Task System</h1>

        <div class="section">
            <h2>System Stats</h2>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-value" id="totalNodes">0</div>
                    <div class="stat-label">Total Nodes</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="totalCores">0</div>
                    <div class="stat-label">CPU Cores</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="totalMemory">0</div>
                    <div class="stat-label">Memory (GB)</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="uptime">0</div>
                    <div class="stat-label">Uptime (s)</div>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>Submit Task</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label for="taskType">Task Type:</label>
                    <select id="taskType" required>
                        <option value="hash">Hash Calculation (SHA256)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="startRange">Start Number:</label>
                    <input type="number" id="startRange" value="0" min="0" required>
                </div>
                <div class="form-group">
                    <label for="endRange">End Number:</label>
                    <input type="number" id="endRange" value="1000" min="1" required>
                </div>
                <div class="form-group">
                    <label for="algorithm">Algorithm:</label>
                    <select id="algorithm" required>
                        <option value="sha256">SHA256</option>
                    </select>
                </div>
                <button type="submit" id="submitBtn">Submit Task</button>
            </form>

            <div id="taskStatus">
                <strong>Task ID:</strong> <span id="currentTaskId">-</span><br>
                <strong>Status:</strong> <span id="taskStatusText">Processing...</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%">0%</div>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>Task Log</h2>
            <div class="log-container" id="logContainer">
                <div class="log-entry info">
                    <span class="timestamp">[System]</span> Dashboard ready. Submit a task to begin.
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let currentTaskId = null;
        let logEntries = [];

        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const entry = {
                timestamp,
                message,
                type
            };
            logEntries.push(entry);

            const logContainer = document.getElementById('logContainer');
            const logDiv = document.createElement('div');
            logDiv.className = `log-entry ${type}`;
            logDiv.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${message}`;
            logContainer.appendChild(logDiv);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/api/stats`);
                const data = await response.json();

                document.getElementById('totalNodes').textContent = data.total_nodes;
                document.getElementById('totalCores').textContent = data.total_cpu_cores;
                document.getElementById('totalMemory').textContent = Math.round(data.total_memory_mb / 1024);
                document.getElementById('uptime').textContent = data.uptime_seconds;
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        async function submitTask(taskData) {
            try {
                addLog(`Submitting task: Hash calculation (${taskData.start} to ${taskData.end})`, 'info');

                const response = await fetch(`${API_BASE}/api/tasks/submit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(taskData)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                currentTaskId = result.task_id;

                addLog(`Task submitted successfully! ID: ${result.task_id}`, 'success');
                addLog(`Task is being split and distributed to validators...`, 'info');

                document.getElementById('taskStatus').style.display = 'block';
                document.getElementById('currentTaskId').textContent = result.task_id;
                document.getElementById('taskStatusText').textContent = 'Processing...';

                simulateProgress();

                return result;
            } catch (error) {
                addLog(`Error submitting task: ${error.message}`, 'error');
                throw error;
            }
        }

        function simulateProgress() {
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    document.getElementById('taskStatusText').textContent = 'Completed!';
                    addLog('Task execution completed. Check console logs for detailed results.', 'success');
                    addLog('Results aggregated. Speedup calculated.', 'success');
                }
                document.getElementById('progressFill').style.width = progress + '%';
                document.getElementById('progressFill').textContent = Math.round(progress) + '%';
            }, 500);
        }

        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const taskData = {
                task_type: document.getElementById('taskType').value,
                start: parseInt(document.getElementById('startRange').value),
                end: parseInt(document.getElementById('endRange').value),
                algorithm: document.getElementById('algorithm').value
            };

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            try {
                await submitTask(taskData);
            } catch (error) {
                console.error('Task submission failed:', error);
            } finally {
                setTimeout(() => {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Submit Task';
                }, 2000);
            }
        });

        loadStats();
        setInterval(loadStats, 5000);

        addLog('Dashboard initialized. Waiting for task submission...', 'info');
    </script>
</body>
</html>
